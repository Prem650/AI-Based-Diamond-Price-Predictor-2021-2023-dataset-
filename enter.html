<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Diamond Details - Diamond Price Analyser</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="dia.png">
</head>
<body>
    <video autoplay muted loop id="video">
        <source src="Comp 1_2.mp4" type="video/mp4">
    </video>
    
    <div class="photo">
        <img src="dia.png" height="50px">
    </div> 
    <div class="small">
        <a id="home" href="index.html"><u>Home</u></a>
        <a id="about" href="about.html"><u>About Us </u></a>
    </div>
    
    <div class="main-title">  
        <p id="mainny1">ENTER DETAILS</p>
        <p id="btext1">Get Price Prediction</p>
    </div>
    
    <div class="form-container" id="form-container">
        <form id="diamond-form">
            <div class="form-group">
                <label for="carat">Carat (0.2 - 5.0):</label>
                <input type="number" id="carat" name="carat" min="0.2" max="5.0" step="0.01" value="1.0" required>
            </div>
            
            <div class="form-group">
                <label for="cut">Cut:</label>
                <select id="cut" name="cut" required>
                    <option value="Fair">Fair</option>
                    <option value="Good" selected>Good</option>
                    <option value="Very Good">Very Good</option>
                    <option value="Premium">Premium</option>
                    <option value="Ideal">Ideal</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="color">Color:</label>
                <select id="color" name="color" required>
                    <option value="J">J</option>
                    <option value="I">I</option>
                    <option value="H">H</option>
                    <option value="G" selected>G</option>
                    <option value="F">F</option>
                    <option value="E">E</option>
                    <option value="D">D</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="clarity">Clarity:</label>
                <select id="clarity" name="clarity" required>
                    <option value="I1">I1</option>
                    <option value="SI2">SI2</option>
                    <option value="SI1">SI1</option>
                    <option value="VS2" selected>VS2</option>
                    <option value="VS1">VS1</option>
                    <option value="VVS2">VVS2</option>
                    <option value="VVS1">VVS1</option>
                    <option value="IF">IF</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="depth">Depth (% 55-70):</label>
                <input type="number" id="depth" name="depth" min="55" max="70" step="0.1" value="62.0" required>
            </div>
            
            <div class="form-group">
                <label for="table">Table (% 50-70):</label>
                <input type="number" id="table" name="table" min="50" max="70" step="0.1" value="57.0" required>
            </div>
            
            <div class="form-group">
                <label for="x">Length (x mm 0-10):</label>
                <input type="number" id="x" name="x" min="0" max="10" step="0.01" value="6.50" required>
            </div>
            
            <div class="form-group">
                <label for="y">Width (y mm 0-10):</label>
                <input type="number" id="y" name="y" min="0" max="10" step="0.01" value="6.40" required>
            </div>
            
            <div class="form-group">
                <label for="z">Depth (z mm 0-10):</label>
                <input type="number" id="z" name="z" min="0" max="10" step="0.01" value="3.90" required>
            </div>
            
            <button type="submit" id="submit-btn">PREDICT PRICE</button>
        </form>
        
        <div id="loading" style="display:none; color: white; font-size: 20px; margin-top: 20px;">
            Predicting... Please wait
        </div>
    </div>

    <script>
        document.getElementById('diamond-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                carat: parseFloat(document.getElementById('carat').value),
                cut: document.getElementById('cut').value,
                color: document.getElementById('color').value,
                clarity: document.getElementById('clarity').value,
                depth: parseFloat(document.getElementById('depth').value),
                table: parseFloat(document.getElementById('table').value),
                x: parseFloat(document.getElementById('x').value),
                y: parseFloat(document.getElementById('y').value),
                z: parseFloat(document.getElementById('z').value)
            };
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('submit-btn').disabled = true;
            
            const API_URL = window.API_URL || 'http://localhost:8000';
            
            try {
                const response = await fetch(`${API_URL}/predict`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });
                
                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}`);
                }
                
                const result = await response.json();
                
                // Store inputs in sessionStorage
                sessionStorage.setItem('diamondInputs', JSON.stringify(formData));
                sessionStorage.setItem('predictedPrice', result.predicted_price);
                
                // Redirect to result
                window.location.href = 'result.html';
            } catch (error) {
                alert(`Prediction failed. Make sure server is running at ${API_URL}`);
                console.error('Error:', error);
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('submit-btn').disabled = false;
            }
        });
    </script>
</body>
</html>
